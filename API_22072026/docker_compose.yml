services:
  mysql:
    image: mysql:latest
    container_name: c_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - db

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: c_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: c_mysql
    networks:
      - db

volumes:
  mysql_data:

networks:
  db:





