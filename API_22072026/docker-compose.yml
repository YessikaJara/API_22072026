services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: api_22072026_app
    container_name: c_app
    ports:
      - "8000:8000"
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: root
      DB_PASSWORD: 1234
    depends_on:
      - mysql
    networks:
      - db

  mysql:
    image: mysql:latest
    container_name: c_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: laravel
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - db

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: c_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: 1234
    depends_on:
      - mysql
    networks:
      - db

volumes:
  mysql_data:

networks:
  db:





